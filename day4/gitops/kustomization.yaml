# Day 4 / Lab 16 — what the Flux Kustomization applies from your Git repo:
# the OCIRepository (chart source), the HelmRelease (the app), the cnpg Cluster (the DB),
# and a ConfigMap built from values.yaml that the HelmRelease reads.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ocirepository.yaml
  - release.yaml
  - cnpg-cluster.yaml
configMapGenerator:
  - name: todo-values
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true     # keep the name "todo-values" stable so the HelmRelease's valuesFrom resolves
