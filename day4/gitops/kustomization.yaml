# Day 4 / Lab 16 — what the Flux Kustomization applies from your Git repo:
# the OCIRepository (chart source), the HelmRelease (the app), the cnpg Cluster (the DB),
# and a ConfigMap built from values.yaml that the HelmRelease reads.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Pin every generated/applied object to your namespace. Flux's multi-tenant Kustomization
# impersonates the "flux" ServiceAccount in your namespace, so this must match it.
# The lab substitutes "studentNN" with your real namespace (sed), like values.yaml.
namespace: studentNN
resources:
  - ocirepository.yaml
  - release.yaml
  - cnpg-cluster.yaml
configMapGenerator:
  - name: todo-values
    files:
      - values.yaml
# Teach Kustomize that HelmRelease.spec.valuesFrom[].name points at a ConfigMap, so the
# hash suffix on the generated "todo-values-<hash>" is rewritten into the HelmRelease too.
# Editing values.yaml -> new hash -> new name -> HelmRelease changes -> Flux upgrades.
configurations:
  - kustomizeconfig.yaml
