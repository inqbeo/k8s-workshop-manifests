# Day 4 / Lab 16 — the HA Postgres Cluster, now part of the GitOps repo so Flux owns it.
# Identical to day4/01-pg-cluster.yaml (Lab 15); copied here so a single `cp gitops/* .`
# pulls the whole desired state into your Gitea repo. The cnpg operator turns this one
# resource into a primary + two replicas, the db-rw Service and the db-app Secret.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: db
  labels:
    app: todo
spec:
  instances: 3                 # 1 primary + 2 replicas (synchronous-capable)
  storage:
    size: 1Gi                  # uses the default StorageClass (Longhorn on this cluster)
  bootstrap:
    initdb:
      database: todo
      owner: todo              # cnpg generates the db-app Secret (uri/host/port/username/password)
