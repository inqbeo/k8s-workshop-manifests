# Day 4 / Lab 13 — Kustomize base.
# Lists the shared resources AND generates the app-config ConfigMap. Because it's a
# generator, the rendered ConfigMap gets a content hash suffix (app-config-<hash>),
# and Kustomize rewrites the Deployment's configMapRef to match — so a config change
# rolls the Deployment automatically. The prod overlay merges a couple of values in.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml

configMapGenerator:
  - name: app-config
    literals:
      - COMPANY_NAME=Workshop
      - THEME=coral
      - LOG_LEVEL=info
      - DB_DRIVER=postgres
