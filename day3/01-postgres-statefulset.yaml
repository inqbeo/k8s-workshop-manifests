# Block 6 — Postgres as a StatefulSet (stable identity + per-Pod storage).
# Minimal, own manifest (NOT Bitnami). No real redundancy -> not production;
# the clean way (CloudNativePG operator) is Day 4.
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  labels:
    app: todo-db
type: Opaque
stringData:
  POSTGRES_USER: "todo"
  POSTGRES_PASSWORD: "todo"
  POSTGRES_DB: "todo"
---
apiVersion: v1
kind: Service
metadata:
  name: db                 # the app reaches the DB as: db:5432 (in-cluster DNS)
  labels:
    app: todo-db
spec:
  clusterIP: None          # headless service for the StatefulSet
  selector:
    app: todo-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  labels:
    app: todo-db
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: todo-db
  template:
    metadata:
      labels:
        app: todo-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: db-secret
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "todo"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
        # storageClassName: longhorn
