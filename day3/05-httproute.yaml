# Day 3 / Block 4 — VARIANT A (Gateway API), part 2 of 2: the HTTPRoute.
#
# The app team's half: "this host -> my Service". It attaches to YOUR Gateway
# (05-gateway.yaml) by parentRefs, in the same namespace. The Gateway does the
# listening + TLS; this Route does the routing. Apply this AFTER the Gateway.
#
#   >>> the lab guide's sed fills YOUR namespace into the host (e.g. student-07) <<<
#   kubectl apply    -n <your-namespace> -f day3/05-httproute.yaml
#   kubectl describe -n <your-namespace> httproute app
#   # open https://app-studentNN.k8s-workshop.inqbeo.academy  (valid padlock)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app
  labels:
    app: todo
spec:
  parentRefs:
    - name: app                 # YOUR Gateway (05-gateway.yaml), in this namespace
      kind: Gateway
  hostnames:
    - app-studentNN.k8s-workshop.inqbeo.academy   # <- the guide's sed substitutes your host
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: app             # the ClusterIP Service from Day 2
          port: 8080
