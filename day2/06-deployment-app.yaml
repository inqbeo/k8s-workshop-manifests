# Block 5 — the "full" Deployment: config & secret via envFrom, PVC for /data, probes.
# This supersedes 02-deployment.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: todo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo
  template:
    metadata:
      labels:
        app: todo
    spec:
      # The app runs as a non-root user; the Longhorn volume is mounted root-owned.
      # fsGroup makes the mounted volume group-owned by the app's GID so it can
      # write its SQLite file (without this the container crashes:
      # "unable to open database file"). Deeper than today's scope — just know it's here.
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch   # optional: faster on large/already-correct volumes
      containers:
        - name: app
          image: ghcr.io/inqbeo/containerization-demo-webapp:0.1.1
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: app-data
