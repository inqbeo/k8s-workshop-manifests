# Block 6 — a stateless app that actually scales, so a Service can load-balance.
# traefik/whoami answers every request with the responding Pod's hostname, so
# round-robin across replicas is visible. Our todo app can't do this: it has one
# RWO PVC (two Pods can't share it), and giving each replica its own volume would
# mean each one has different data — nonsense for a single app. State belongs in a
# shared database (Day 3); stateless apps like this are what you scale behind a Service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  labels:
    app: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.2
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  labels:
    app: whoami
spec:
  type: ClusterIP
  selector:
    app: whoami
  ports:
    - name: http
      port: 80
      targetPort: 80
