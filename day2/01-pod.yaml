# Block 3 — Pods: the building block
# A bare Pod running the demo app (SQLite mode, ephemeral, no volume/config yet).
# No AUTH_PASSWORD is set on purpose: the app generates a random admin password
# and prints it to the log — exactly the Day-1 "grab it from the logs" reflex.
# Apply into your namespace:  kubectl apply -n student-NN -f 01-pod.yaml
apiVersion: v1
kind: Pod
metadata:
  name: app
  labels:
    app: todo
spec:
  containers:
    - name: app
      image: ghcr.io/inqbeo/containerization-demo-webapp:0.1.2
      ports:
        - containerPort: 8080
